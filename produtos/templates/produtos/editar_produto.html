<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 40px; }
        .container { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 10px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        .btn-salvar { background: #4caf50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Editar Produto</h1>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="nome" value="{{ produto.nome }}" required>
            <textarea name="descricao" rows="4">{{ produto.descricao }}</textarea>
            <input type="number" name="quantidade" value="{{ produto.quantidade }}" required>
            <input type="text" name="preco" value="{{ produto.preco }}" required>
            <button type="submit" class="btn-salvar">Salvar Alterações</button>
            <a href="{% url 'detalhe_produto' produto.pk %}" style="color: #aaa; display: block; text-align: center; margin-top: 15px;">Cancelar</a>
        </form>
    </div>
</body>
</html>
